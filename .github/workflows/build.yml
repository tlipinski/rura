name: Build

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          # Deactivated: x86_64-apple-darwin (re-enable by uncommenting)
          # - os: macos-13
          #   target: x86_64-apple-darwin
          #   use_cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rura-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/rura
          if-no-files-found: error
          retention-days: 30

  nightly:
    name: Publish nightly release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Stage release files
        run: |
          set -euo pipefail
          mkdir -p out
          for d in dist/rura-*; do
            target=${d#dist/rura-}
            cp "$d/rura" "out/rura-${target}"
          done
          (cd out && sha256sum rura-* > SHA256SUMS)
          ls -la out

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly build
          body: |
            Rolling nightly build of `master`. Replaced on every push.

            Commit: ${{ github.sha }}
            Run: ${{ github.run_id }}
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            out/*
